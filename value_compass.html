function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); for(const k in charts) delete charts[k]; }

function makeChart(id, type, labels, datasets, opts = {}) {
  const el = document.getElementById(id);
  if (!el) return;
  const ctx = el.getContext("2d");
  if (charts[id]) charts[id].destroy();
  const defaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: opts.legend || false, labels: { color: "#8b99b0", font: { size: 11 } } } },
    scales: type === "doughnut" || type === "pie" || type === "polarArea" ? {} : {
      x: { grid: { color: "#1c2740" }, ticks: { color: "#8b99b0", font: { size: 10 }, maxRotation: 45 } },
      y: { grid: { color: "#1c2740" }, ticks: { color: "#8b99b0", font: { size: 10 } }, ...(opts.yMin !== undefined ? { min: opts.yMin } : {}), ...(opts.yMax !== undefined ? { max: opts.yMax } : {}) },
    },
  };
  if (type === "hbar") {
    type = "bar";
    defaults.indexAxis = "y";
  }
  charts[id] = new Chart(ctx, { type, data: { labels, datasets }, options: defaults });
}

function mc(label, val, sub) {
  return `<div class="card-sm"><div class="label">${label}</div><div class="val">${val}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
}

function chartCard(id, title, cn, h = 280) {
  return `<div class="card" style="margin-bottom:14px"><div class="chart-title">${title}${cn ? `<span class="cn">${cn}</span>` : ""}</div><div class="chart-wrap" style="height:${h}px"><canvas id="${id}"></canvas></div></div>`;
}

  </div>`;

  if (currentSub === "financials") {
    html += `<div class="metric-row fade-in">
      ${mc("P/E",c.pe+"x","Fwd: "+c.fpe+"x")} ${mc("ROE",c.roe+"%","")} ${mc("Yield",c.dy+"%","")}
      ${mc("D/E",c.de.toFixed(2),"")} ${mc("Mkt Cap","$"+c.mc+"B","")} ${mc("Revenue","$"+c.rev+"B","")}
      ${mc("Net Inc","$"+c.ni+"B","")} ${mc("Cash","$"+c.cash+"B","")} ${mc("Beta",c.beta.toFixed(2),"")}
    </div>`;
    html += `<div class="grid2 fade-in">
      ${chartCard("co_rev","Revenue History ($B)","营收历史")}
      ${chartCard("co_seg","Revenue Breakdown","营收结构")}
    </div>`;
  } else {
    html += `<div class="grid2 fade-in">`;
    c.moats.forEach((m,i) => { html += chartCard("moat_"+i, m.t, "", 260); });
    html += `</div>`;
  }
  html += `<div class="source-note fade-in">Data from SEC filings (10-K, 10-Q), HKEX filings, company annual reports & investor presentations (FY2024/FY2025). Revenue in USD billions unless noted. CNY converted at approx rates. Not investment advice. 数据来源：SEC文件、港交所公告及公司年报。仅供参考，不构成投资建议。</div>`;

  document.getElementById("app").innerHTML = html;

  setTimeout(() => {
    if (currentSub === "financials") {
      makeChart("co_rev","bar",c.revH.l,[{label:"Revenue ($B)",data:c.revH.d,backgroundColor:SC[t]+"bb",borderRadius:4}]);
      makeChart("co_seg","doughnut",c.seg.l,[{data:c.seg.d,backgroundColor:PIES.slice(0,c.seg.l.length),borderWidth:0}],{legend:true});
    } else {
      c.moats.forEach((m,i) => {
        const id = "moat_"+i;
        if (m.type === "doughnut") {
          makeChart(id,"doughnut",m.l,[{data:m.d,backgroundColor:m.c,borderWidth:0}],{legend:true});
        } else if (m.type === "hbar") {
          makeChart(id,"hbar",m.l,[{label:m.t.split(" ")[0],data:m.d,backgroundColor:m.c+"bb",borderRadius:4}]);
        } else {
          makeChart(id,m.type,m.l,[{
            label:m.t.split(" ")[0], data:m.d,
            ...(m.type==="line" ? {borderColor:m.c,backgroundColor:m.c+"22",fill:true,tension:.3,pointRadius:4,pointBackgroundColor:m.c} : {backgroundColor:m.c+"bb",borderRadius:4}),
          }]);
        }
      });
    }
  }, 50);
}

function renderCompare() {
  const metrics = [
    {k:"pe",l:"P/E Ratio 市盈率"},{k:"roe",l:"ROE 净资产收益率"},{k:"dy",l:"Dividend Yield 股息率"},
    {k:"de",l:"Debt/Equity 负债比"},{k:"mc",l:"Market Cap ($B) 市值"},{k:"rev",l:"Revenue ($B) 营收"},
  ];
  let html = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px" class="fade-in">`;
  metrics.forEach(m => {
    html += `<button class="sub-tab ${window._cmpMetric===m.k?"on":""}" onclick="switchMetric('${m.k}')">${m.l}</button>`;
  });
  html += `</div>`;
  html += `<div class="fade-in">${chartCard("cmp_bar","Cross-Company Comparison","跨公司对比",400)}</div>`;
  html += `<div class="fade-in">${chartCard("cmp_radar","Quality Radar — All 10 Picks","质量雷达图",380)}</div>`;
  document.getElementById("app").innerHTML = html;

  const mk = window._cmpMetric || "pe";
  const sorted = TK.map(t=>({t,v:D[t][mk],n:D[t].name.split(" ")[0]})).sort((a,b)=>b.v-a.v);

  setTimeout(() => {
    makeChart("cmp_bar","bar", sorted.map(s=>s.n), [{
      label: metrics.find(m=>m.k===mk).l,
      data: sorted.map(s=>s.v),
      backgroundColor: sorted.map(s=>SC[s.t]+"cc"),
      borderRadius: 4,
    }]);
    // Radar
    const radarData = TK.map(t => ({
      pe: Math.max(0, 30-D[t].pe), roe: D[t].roe, dy: D[t].dy * 5
    }));
    makeChart("cmp_radar","radar", TK.map(t=>D[t].name.split(" ")[0]), [
      { label:"Value (30-PE)", data:radarData.map(r=>r.pe), borderColor:"#4f8ff7", backgroundColor:"rgba(79,143,247,.1)", pointBackgroundColor:"#4f8ff7" },
      { label:"ROE (%)", data:radarData.map(r=>r.roe), borderColor:"#34d399", backgroundColor:"rgba(52,211,153,.08)", pointBackgroundColor:"#34d399" },
      { label:"Yield (×5)", data:radarData.map(r=>r.dy), borderColor:"#f0a830", backgroundColor:"rgba(240,168,48,.08)", pointBackgroundColor:"#f0a830" },
    ], { legend: true });
  }, 50);
}

// ===== NAVIGATION =====
window._cmpMetric = "pe";

function switchTab(tab) {
  currentTab = tab;
  destroyCharts();
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("on", b.dataset.tab === tab));
  render();
}
window.goCompany = function(t) { currentTicker = t; currentSub = "financials"; switchTab("company"); };
window.switchSub = function(s) { currentSub = s; destroyCharts(); renderCompany(); };
window.switchMetric = function(k) { window._cmpMetric = k; destroyCharts(); renderCompare(); };

function render() {
  if (currentTab === "overview") renderOverview();
  else if (currentTab === "company") renderCompany();
  else if (currentTab === "compare") renderCompare();
}

document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));
render();
</script>
</body>
</html>
